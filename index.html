<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Servidor en C | Inicio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #e94560;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #16213e;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            text-align: center;
            border: 1px solid #0f3460;
            max-width: 400px;
        }
        h1 { 
            margin-top: 0; 
            color: #fff; 
            background: #e94560; 
            padding: 15px; 
            border-radius: 10px;
            font-size: 1.8rem;
        }
        p { color: #8892b0; line-height: 1.6; }
        .status-box {
            background: #0f3460;
            padding: 10px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .status { color: #4ecca3; font-weight: bold; }
        
        .nav-link {
            display: inline-block;
            margin-top: 15px;
            color: #4ecca3;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid #4ecca3;
            padding: 10px 20px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .nav-link:hover {
            background: #4ecca3;
            color: #16213e;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Servidor de Unai</h1>
        <p>Este sitio web está siendo servido por un programa escrito desde cero en <strong>lenguaje C</strong>.</p>
        
        <div class="status-box">
            <p style="margin:0;">Estado: <span class="status">● ONLINE</span></p>
        </div>

        <a href="/contacto.html" class="nav-link">Ir a Contacto →</a>
    </div>
</body>
</html>
