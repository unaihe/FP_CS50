<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - Mi Servidor</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f172a;
            color: #38bdf8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1e293b;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(56, 189, 248, 0.2);
            text-align: center;
            border: 1px solid #334155;
        }
        h1 { color: #f8fafc; border-bottom: 2px solid #38bdf8; padding-bottom: 10px; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); background-color: #7dd3fc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Página de Contacto</h1>
        <p>Has navegado con éxito hasta aquí usando tu servidor en C.</p>
        <p>Email: <strong>unai@servidor-pro.com</strong></p>
        <a href="/" class="btn">Volver al Inicio</a>
    </div>
</body>
</html>
